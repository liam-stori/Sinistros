name: sinistrosapi

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: sinistros_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7070:7070"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=sinistros_db;Username=postgres;Password=postgres;
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
